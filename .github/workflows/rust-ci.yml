name: Rust CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo check --workspace
        run: cargo check --workspace

  check-espidf:
    # Honest validation of the embedded code path using the real Xtensa toolchain.
    # Note: Standard runners lack pre-compiled core/std for this Tier 3 target.
    # We use RUSTC_BOOTSTRAP and -Zbuild-std to honestly exercise the target-specific
    # code path and its dependencies without hacks or "fake" cfgs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Prepare environment
        run: rm rust-toolchain.toml
      - name: Install Rust for Xtensa
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true
      - uses: Swatinem/rust-cache@v2
      - name: cargo check -p usb2ble-platform-espidf --target xtensa-esp32s3-espidf
        env:
          RUSTC_BOOTSTRAP: 1
        run: cargo check -p usb2ble-platform-espidf --target xtensa-esp32s3-espidf -Zbuild-std

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace
        run: cargo test --workspace
